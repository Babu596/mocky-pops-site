<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Events & Bulk Orders | Mocky Pops</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="events">
    <header class="topbar">
      <a class="brand" href="index.html"><span class="brand-mark">MP</span><span><strong>Mocky Pops</strong><small>Events</small></span></a>
      <nav class="nav-links"><a href="index.html">Home</a><a href="franchise.html">Franchise</a><a href="gift-card.html">Gift Cards</a></nav>
    </header>
    <main class="page-shell">
      <section class="page-hero compact-hero">
        <p class="eyebrow">Bulk orders</p>
        <h1>Mocktails for parties and teams</h1>
      </section>
      <section class="customer-dashboard">
        <form class="checkout-form" data-event-form>
          <h2>Event Enquiry</h2>
          <label>Name <input name="customer_name" required /></label>
          <label>Phone <input name="phone" required /></label>
          <label>Email <input type="email" name="email" /></label>
          <label>Event type <input name="event_type" placeholder="Birthday, corporate, party" required /></label>
          <label>Event date <input type="datetime-local" name="event_date" /></label>
          <label>Guest count <input type="number" name="guest_count" min="1" required /></label>
          <label>Location <input name="location" required /></label>
          <label>Package preference <input name="package_preference" /></label>
          <label>Notes <textarea name="notes" rows="4"></textarea></label>
          <button class="checkout-button" type="submit">Request Quotation</button>
          <p class="admin-message" data-phase4-message></p>
        </form>
        <aside class="summary-card">
          <h2>Packages</h2>
          <p>Party counters, birthday coolers, corporate subscriptions and custom mocktail bars.</p>
        </aside>
      </section>
    </main>
    <script src="phase4.js"></script>
  </body>
</html>
