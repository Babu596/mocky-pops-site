<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Checkout securely with Mocky Pops delivery order form." />
    <title>Checkout | Mocky Pops</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="checkout">
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Mocky Pops home">
        <span class="brand-mark">MP</span>
        <span>
          <strong>Mocky Pops</strong>
          <small>Craft mocktails delivered</small>
        </span>
      </a>

      <nav class="nav-links" aria-label="Primary navigation">
        <a href="index.html#menu">Menu</a>
        <a href="cart.html">Cart</a>
        <a href="orders.html">Orders</a>
        <a href="index.html#business">Business Orders</a>
      </nav>

      <div class="header-actions">
        <a class="cart-button" href="cart.html">Cart <span data-cart-count>0</span></a>
      </div>
    </header>

    <main class="page-shell">
      <section class="page-hero compact-hero">
        <p class="eyebrow">Checkout</p>
        <h1>Delivery Details</h1>
        <p>Place your Mocky Pops order with customer details and delivery instructions.</p>
      </section>

      <section class="checkout-layout">
        <form class="checkout-form" data-checkout-form>
          <div class="form-grid">
            <label>
              Customer name
              <input name="name" type="text" placeholder="Full name" required />
            </label>
            <label>
              Phone number
              <input name="phone" type="tel" placeholder="10 digit mobile number" pattern="[0-9]{10}" required />
            </label>
          </div>

          <label>
            Saved delivery address
            <select name="address_id" data-saved-addresses>
              <option value="">Use typed address</option>
            </select>
          </label>

          <label>
            Delivery address
            <textarea name="address" rows="5" placeholder="House number, street, area, city and pincode" required></textarea>
          </label>

          <fieldset class="payment-options">
            <legend>Payment option</legend>
            <label>
              <input type="radio" name="payment" value="Cash on delivery" checked />
              Cash on delivery
            </label>
            <label>
              <input type="radio" name="payment" value="Online payment" />
              Online payment
            </label>
            <label>
              <input type="radio" name="payment" value="Gift card" />
              Gift card balance
            </label>
          </fieldset>

          <label>
            Delivery instructions
            <input name="instructions" type="text" placeholder="Gate code, landmark, no ice, call on arrival..." />
          </label>

          <div class="form-grid">
            <label>
              Coupon
              <input name="coupon" type="text" placeholder="MOCKY10 or WELCOME20" />
            </label>
            <label>
              Gift card
              <input name="gift_card" type="text" placeholder="Gift card code" />
            </label>
          </div>

          <button class="checkout-button" type="submit">Place Order</button>
          <div class="order-confirmation" data-order-confirmation></div>
        </form>

        <aside class="summary-card">
          <h2>Order Summary</h2>
          <div class="checkout-items" data-checkout-items></div>
          <div data-checkout-summary></div>
          <a class="text-action" href="cart.html">Edit cart</a>
        </aside>
      </section>
    </main>

    <footer class="site-footer">
      <strong>Mocky Pops</strong>
      <span>Checkout data is stored locally for this frontend phase.</span>
    </footer>

    <script src="products.js"></script>
    <script src="script.js"></script>
  </body>
</html>
