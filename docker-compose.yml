services:
  api:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.production.example
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend/app/static/uploads:/app/app/static/uploads

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mocky_pops
    ports:
      - "5432:5432"
    volumes:
      - mocky_pops_pgdata:/var/lib/postgresql/data

volumes:
  mocky_pops_pgdata:
